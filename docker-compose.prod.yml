version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: tacticboard-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./backend/src/db/seeds:/docker-entrypoint-initdb.d/seeds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tacticboard-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: tacticboard-backend-prod
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tacticboard-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: tacticboard-frontend-prod
    restart: always
    networks:
      - tacticboard-net

  nginx:
    image: nginx:alpine
    container_name: tacticboard-nginx-prod
    restart: always
    ports:
      - "3006:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tacticboard-net
      - choptaloc-network

volumes:
  pgdata_prod:

networks:
  tacticboard-net:
    driver: bridge
  choptaloc-network:
    external: true
